name: Build Agent Installers

on:
  push:
    tags:
      - 'agent-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: |
              apps/agent/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
              apps/agent/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: |
              apps/agent/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              apps/agent/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: |
              apps/agent/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/agent/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libxdo-dev libxtst-dev \
            libx11-dev libxcb1-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build agent
        run: pnpm --filter @bcwork/agent tauri build --target ${{ matrix.target }}
        env:
          # Firma opcional — sin estos secrets el instalador se genera sin firma digital
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: bcwork-agent-${{ matrix.platform }}
          path: ${{ matrix.artifact }}
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          name: BCWork Agent ${{ github.ref_name }}
          body: |
            ## BCWork Agent ${{ github.ref_name }}

            ### Descargas

            | Plataforma | Archivo |
            |-----------|---------|
            | Windows (instalador) | `BCWork-Agent_1.0.0_x64-setup.exe` |
            | Windows (MSI) | `BCWork-Agent_1.0.0_x64_en-US.msi` |
            | Linux (Debian/Ubuntu) | `bcwork-agent_1.0.0_amd64.deb` |
            | Linux (AppImage) | `bcwork-agent_1.0.0_amd64.AppImage` |
            | macOS (Apple Silicon) | `BCWork-Agent_1.0.0_aarch64.dmg` |

            ### Instalación

            **Windows**: Ejecutar el `.exe` o `.msi` como administrador.
            **Linux**: `sudo dpkg -i bcwork-agent_*.deb` o hacer ejecutable el `.AppImage`.
            **macOS**: Abrir el `.dmg` y arrastrar a Aplicaciones.
